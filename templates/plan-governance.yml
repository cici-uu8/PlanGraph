version: 1
adoption_report_path: docs/plan_adoption_report.md
registry_path: docs/plan_registry.md
timeline_report_path: docs/plan_timeline_report.md
quarantine_path: docs/plan_quarantine.md
mainline_doc_paths: []
mainline_mode: auto
execution_policy: auto
update_mode: hybrid
install_agents_block: true
frontmatter:
  managed_keys:
    - plan_id
    - doc_role
    - workstream
    - lifecycle_status
    - execution_status
    - authoritative
    - parent_plan
    - supersedes
    - superseded_by
    - created_at
    - last_reviewed_at
status_enums:
  lifecycle_status:
    - proposed
    - active
    - superseded
    - closed
    - rejected
    - deferred
    - archived
    - unknown
  execution_status:
    - not_started
    - in_progress
    - blocked
    - completed
    - cancelled
    - n_a
  doc_role:
    - master_plan
    - execution_plan
    - workstream_plan
    - state_doc
    - decision_doc
    - closeout_doc
    - reference_doc
    - evidence_doc
    - unknown
scan:
  include_globs:
    - "*.md"
    - "docs/**/*.md"
  exclude_globs:
    - ".git/**"
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - "output/**"
classification:
  high_confidence_threshold: 0.85
  quarantine_threshold: 0.55
  transcript_patterns:
    - "*对话记录*"
    - "*聊天记录*"
    - "*chat-transcript*"
    - "*chat_transcript*"
    - "*conversation*"
    - "*meeting-transcript*"
    - "*meeting_transcript*"
    - "*transcript*"
  filename_patterns:
    master_plan:
      - "*主控*"
      - "*master*plan*"
      - "*roadmap*"
    execution_plan:
      - "*执行清单*"
      - "*准备清单*"
      - "*清单*"
      - "*checklist*"
      - "*week*"
      - "*month*"
    state_doc:
      - "PROJECT_STATE.md"
      - "progress.md"
      - "findings.md"
      - "task_plan.md"
    closeout_doc:
      - "*收口*"
      - "*总结*"
      - "*历史完成记录*"
      - "*closeout*"
    evidence_doc:
      - "*evidence*"
      - "*review*"
      - "*报告*"
      - "*report*"
